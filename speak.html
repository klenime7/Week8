UNIT 40

        `;

        // 為了修復你發現的問題，這邊改以強化的架構先把純資料建構出來：
        // 陣列長這樣: [ {name: "UNIT 1", words:["plan", "care"...]} ... ]
        const unitsData =[];
        let currentParseUnit = null;

        const lines = rawData.trim().split('\n');
        for(let textLine of lines){
            let line = textLine.trim();
            if (!line) continue;

            if (line.startsWith('UNIT')) {
                currentParseUnit = {
                    name: line,
                    words:[]
                };
                unitsData.push(currentParseUnit);
            } else if(currentParseUnit) {
                let wArr = line.split(',').map(w => w.trim()).filter(w => w.length > 0);
                currentParseUnit.words.push(...wArr);
            }
        }

        const container = document.getElementById('vocabulary-container');
        const playAllUnitsBtn = document.getElementById('play-all-units-btn');
        const globalStopBtn = document.getElementById('global-stop-btn');
        const toggleZhBtn = document.getElementById('toggle-zh-btn');
        const globalStatusTextEl = document.getElementById('global-status-text');
        let globalPlayInterrupt = false; 
        const allDetailsBoxes =[];
        const allWordNodes = [];
        const chineseMap = new Map();
        let chineseMapLoaded = false;
        let showChinese = false;

        // 這個函數讓任何語音安全結束與重新復位
        function stopAndClearStatus() {
            globalPlayInterrupt = true; // 發送信號要求後面的語音不再連播
            window.speechSynthesis.cancel();
            
            // 取消全頁面的發光狀態
            document.querySelectorAll('.word-btn').forEach(btn => btn.classList.remove('playing'));
            // 讓所有的文字都重置為安靜
            document.querySelectorAll('.status-text').forEach(st => st.textContent = "");
        }

        function normalizeWordKey(word) {
            return String(word || '').trim().toLowerCase();
        }

        function extractChineseMeaning(rawMeaning) {
            return String(rawMeaning || '')
                .replace(/\((?:v|n|adj|adv|prep|vt|vi|conj|pron)\.?\)/gi, '')
                .replace(/(?:^|\s)(?:v|n|adj|adv|prep|vt|vi|conj|pron)\.(?=\s|$)/gi, ' ')
                .replace(/[;；]/g, '、')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function parseChineseContent(contentText) {
            String(contentText || '').split('\n').forEach((lineText) => {
                const line = lineText.trim();
                if (!line) return;
                const match = line.match(/^([A-Za-z][A-Za-z\-']*)\s+(.+)$/);
                if (!match) return;
                const enWord = match[1];
                const zhRaw = extractChineseMeaning(match[2]);
                if (!zhRaw) return;
                const key = normalizeWordKey(enWord);
                if (!chineseMap.has(key)) chineseMap.set(key, zhRaw);
            });
        }

        async function ensureChineseMapLoaded() {
            if (chineseMapLoaded) return;
            const filePaths = Array.from({ length: unitsData.length }, (_, idx) => `high/unit${idx + 1}.js`);
            const results = await Promise.all(
                filePaths.map(async (path) => {
                    try {
                        const response = await fetch(path);
                        if (!response.ok) {
                            console.warn(`中文資料載入失敗：${path}`);
                            return "";
                        }
                        return await response.text();
                    } catch (err) {
                        console.warn(`中文資料載入失敗：${path}`, err);
                        return "";
                    }
                })
            );
            results.forEach(fileText => {
                const match = String(fileText).match(/content:\s*`([\s\S]*?)`/);
                if (match && match[1]) parseChineseContent(match[1]);
            });
            chineseMapLoaded = true;
        }

        function refreshWordLabels() {
            allWordNodes.forEach(wordData => {
                const key = normalizeWordKey(wordData.text);
                const zh = chineseMap.get(key);
                wordData.el.textContent = (showChinese && zh)
                    ? `${wordData.text} ｜ ${zh}`
                    : wordData.text;
            });
        }

        function openCurrentUnit(unitBox) {
            if (!unitBox.open) unitBox.open = true;
        }

        function playSequentially(wordNodes, onDone) {
            function playNext(currentIndex) {
                if (globalPlayInterrupt || currentIndex >= wordNodes.length) {
                    if (!globalPlayInterrupt && typeof onDone === 'function') onDone();
                    return;
                }

                const wordObject = wordNodes[currentIndex];
                const utterance = new SpeechSynthesisUtterance(wordObject.text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;

                utterance.onstart = () => {
                    openCurrentUnit(wordObject.unitBox);
                    wordObject.el.classList.add('playing');
                    wordObject.el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                };

                utterance.onend = () => {
                    wordObject.el.classList.remove('playing');
                    if (!globalPlayInterrupt) setTimeout(() => playNext(currentIndex + 1), 600);
                };

                utterance.onerror = () => {
                    wordObject.el.classList.remove('playing');
                    if (!globalPlayInterrupt) setTimeout(() => playNext(currentIndex + 1), 100);
                };

                setTimeout(() => {
                    if (!globalPlayInterrupt) window.speechSynthesis.speak(utterance);
                }, 50);
            }
            playNext(0);
        }

        // 當全部清單掃完並變成 Object 物件之後，正式構建按鈕區：
        unitsData.forEach((unitObj, idx) => {
            
            const unitBox = document.createElement('details');
            unitBox.className = 'unit-box';
            if(idx === 0) unitBox.open = true; // 只打開第一單元
            allDetailsBoxes.push(unitBox);

            // 選單單一開闔設計
            unitBox.addEventListener('toggle', (e) => {
                if (e.target.open) {
                    allDetailsBoxes.forEach(b => {
                        if (b !== unitBox && b.open) {
                            b.open = false; 
                        }
                    });
                }
            });

            // 標題 summary
            const summary = document.createElement('summary');
            summary.textContent = "📖 " + unitObj.name;
            unitBox.appendChild(summary);

            // 控制列面板
            const controlPanel = document.createElement('div');
            controlPanel.className = 'controls-panel';
            
            const playUnitBtn = document.createElement('button');
            playUnitBtn.className = 'control-btn play-all-btn';
            playUnitBtn.innerHTML = '▶️ 播放 ' + unitObj.name; 

            const stopBtn = document.createElement('button');
            stopBtn.className = 'control-btn stop-btn';
            stopBtn.innerHTML = '⏹️ 停止';

            const statusTextEl = document.createElement('span');
            statusTextEl.className = 'status-text';

            controlPanel.appendChild(playUnitBtn);
            controlPanel.appendChild(stopBtn);
            controlPanel.appendChild(statusTextEl);
            unitBox.appendChild(controlPanel);

            // 單字區域 DOM 建立
            const gridWrap = document.createElement('div');
            gridWrap.className = 'word-grid';
            const allBtnNodes =[];

            unitObj.words.forEach((wordText) => {
                const btnNode = document.createElement('button');
                btnNode.className = 'word-btn';
                btnNode.textContent = wordText;
                gridWrap.appendChild(btnNode);
                const wordData = { text: wordText, el: btnNode, unitBox };
                allBtnNodes.push(wordData); // 把按鈕記憶起來配對
                allWordNodes.push(wordData);
            });
            unitBox.appendChild(gridWrap);

            // ▼ [最核心的除錯修復區] 直接利用安全封閉式作用域呼叫播音，不用擔心跑掉！
            
            // "播放這整課" 的流程邏輯
            playUnitBtn.onclick = () => {
                stopAndClearStatus();
                globalPlayInterrupt = false; // 解除阻止訊號

                statusTextEl.textContent = "🔊 正在連續播放...";
                statusTextEl.style.color = "#4CAF50";
                playSequentially(allBtnNodes, () => {
                    statusTextEl.textContent = "✅ " + unitObj.name + " 已經順暢播放完畢";
                });
            };

            // "強制中止" 按鍵邏輯
            stopBtn.onclick = () => stopAndClearStatus();

            // 若要強制自己"按任意個別的按鈕強制切進去唸"
            allBtnNodes.forEach(wordData => {
                wordData.el.onclick = () => {
                    // 同樣直接暴力砍掉一切干擾！
                    stopAndClearStatus();

                    const singelUtterance = new SpeechSynthesisUtterance(wordData.text);
                    singelUtterance.lang = 'en-US';
                    singelUtterance.rate = 0.85; 

                    singelUtterance.onstart = () => wordData.el.classList.add('playing');
                    singelUtterance.onend = () => wordData.el.classList.remove('playing');
                    singelUtterance.onerror = () => wordData.el.classList.remove('playing');
                    
                    // 用Timeout防備各大廠覽器自帶的 "切太快就不唸新東西" bug 緩衝。
                    setTimeout(()=>{
                        window.speechSynthesis.speak(singelUtterance);
                    }, 80);
                };
            });

            // 繪製結果附加給 HTML大框框！
            container.appendChild(unitBox);
        });

        playAllUnitsBtn.onclick = () => {
            stopAndClearStatus();
            globalPlayInterrupt = false;
            globalStatusTextEl.textContent = "🔊 正在一鍵播放全部單字...";
            globalStatusTextEl.style.color = "#4CAF50";
            playSequentially(allWordNodes, () => {
                globalStatusTextEl.textContent = "✅ 全部單字播放完畢";
            });
        };

        globalStopBtn.onclick = () => stopAndClearStatus();

        toggleZhBtn.onclick = async () => {
            if (!showChinese) {
                globalStatusTextEl.textContent = "📚 正在載入中文資料...";
                globalStatusTextEl.style.color = "#673AB7";
                await ensureChineseMapLoaded();
                showChinese = true;
                toggleZhBtn.textContent = "🈚 隱藏中文";
                refreshWordLabels();
                globalStatusTextEl.textContent = "✅ 已顯示中文";
            } else {
                showChinese = false;
                toggleZhBtn.textContent = "🈶 顯示中文";
                refreshWordLabels();
                globalStatusTextEl.textContent = "✅ 已隱藏中文";
            }
        };

        // 當離開此分頁或重新整理時直接安靜收口！
        window.onbeforeunload = function() {
            window.speechSynthesis.cancel();
        };

    </script>
</body>
</html>
